# runflare.yaml - فایل پیکربندی اصلی پروژه برای پلتفرم رانفلر
# این فایل به رانفلر می‌گوید که:
# ۱. از داکرفایل خودمان استفاده کند
# ۲. ساختار پروژه ما را بشناسد
# ۳. متغیرهای محیطی را از کجا بخواند

# نوع پروژه: از Dockerfile خودمان استفاده کن (نه از قالب‌های پیش‌فرض)
type: docker

# مشخص کردن مسیر دقیق Dockerfile
dockerfile: Dockerfile

# تعریف سرویس‌ها
services:
  # سرویس اصلی بک‌اند
  - name: backend
    # مسیر ساخت که همان ریشه پروژه است
    context: .
    # پورتی که برنامه روی آن اجرا می‌شود
    port: 8080
    # مسیر فایل‌های برنامه (همان پوشه server)
    workdir: /app
